services:
  db:
    image: ankane/pgvector:latest
    container_name: meeting_agent_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: meeting_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meeting_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meeting_agent_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_agent_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/meeting_agent
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PM_WEBHOOK_URL=${PM_WEBHOOK_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_agent_worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    # Single-Host File Exchange: Both backend and worker containers mount the same directory.
    # When a meeting is uploaded, the API streams the file to `/workspace/uploads/meetings/`.
    # Because they share this local host volume, the Celery worker can access the file at the
    # identical filepath. For horizontal scaling in production, this should be replaced
    # by object storage (e.g. S3) to avoid host node filesystem coupling.
    volumes:
      - ./backend:/workspace
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/meeting_agent
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PM_WEBHOOK_URL=${PM_WEBHOOK_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Celery Worker Health Check: We run celery inspect ping to query the daemon status.
    # If the worker process locks up, stops responding, or loses broker connectivity,
    # Docker Compose will flag the container as unhealthy and restart it automatically.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery_app inspect ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

volumes:
  postgres_data: